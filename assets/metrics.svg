 width: fit-content !important;
 padding-bottom: 6px !important;
 margin: 0 0 10px 0 !important;
 border-bottom: 2.5px solid #92732D !important;
}
h3 {
 font-size: 13px !important;
 color: #ADBAC7 !important;
}
text, tspan, p, span, li, td, th, .value, .field {
 fill: #C9D1D9 !important;
 color: #B8BCC2 !important;
}
.field svg, .octicon {
 fill: #92732D !important;
 color: #92732D !important;
}
.field { border-color: #1A1A1C !important; }
svg.bar rect[fill="#d1d5da"] { fill: #1A1A1C !important; }</style>
