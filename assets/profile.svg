    <path d="M1156 40 H1130 M1156 40 V66" stroke="#8A6D2A" stroke-width="2" stroke-linecap="round"/>
    <path d="M44 260 H70 M44 260 V234" stroke="#8A6D2A" stroke-width="2" stroke-linecap="round"/>
    <path d="M1156 260 H1130 M1156 260 V234" stroke="#8A6D2A" stroke-width="2" stroke-linecap="round"/>

    <text x="64" y="94" font-family="SFMono-Regular, Consolas, monospace" font-size="12" letter-spacing="6" fill="#6E7076">DESENVOLVEDOR  /  BACKEND</text>
