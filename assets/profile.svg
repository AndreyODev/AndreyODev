    <text x="64" y="112" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" fill="#B8BCC2"><tspan font-weight="700" fill="#F2F2F3">8 meses</tspan> de experiencia com programacao. Comecei no front-end e hoje foco no <tspan font-weight="700" fill="#F2F2F3">backend com Java</tspan>.</text>
    <text x="64" y="146" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" fill="#B8BCC2">Ja trabalhei com bancos de dados relacionais (<tspan font-weight="700" fill="#F2F2F3">PostgreSQL</tspan>) e nao relacionais (<tspan font-weight="700" fill="#F2F2F3">MongoDB</tspan>), <tspan font-weight="700" fill="#F2F2F3">APIs REST</tspan></text>
    <text x="64" y="176" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" fill="#B8BCC2">e containerizacao com <tspan font-weight="700" fill="#F2F2F3">Docker</tspan>, alem de validacao e middleware em projetos <tspan font-weight="700" fill="#F2F2F3">Node.js / Express</tspan>.</text>
    <text x="64" y="216" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" fill="#B8BCC2">Atualmente aprofundando <tspan font-weight="700" fill="#F2F2F3">Java</tspan> e <tspan font-weight="700" fill="#F2F2F3">Spring Boot</tspan>, uma stack solida e amplamente usada no mercado.</text>
    <text x="64" y="246" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" fill="#B8BCC2">Busco <tspan font-weight="700" fill="#F2F2F3">estagio ou vaga junior</tspan> em backend ou full stack - aberto a projetos e experiencia real.</text>
  </g>

