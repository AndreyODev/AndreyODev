<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stack técnica">
  <defs>
    <linearGradient id="brassDot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E3B341"/>
      <stop offset="1" stop-color="#C7902B"/>
    </linearGradient>
    <pattern id="gridS" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#12161D" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="340" rx="12" fill="#0D1117"/>
  <rect width="1200" height="340" rx="12" fill="url(#gridS)"/>
  <rect x="0.75" y="0.75" width="1198.5" height="338.5" rx="11.25" fill="none" stroke="#21262D" stroke-width="1.5"/>

  <!-- Backend -->
  <g transform="translate(40, 36)">
    <rect width="350" height="268" rx="8" fill="#161B22" stroke="#21262D" stroke-width="1"/>
    <rect width="350" height="3" rx="1.5" fill="url(#brassDot)"/>
    <text x="20" y="36" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="3" fill="#E3B341">BACKEND</text>
    <text x="20" y="58" font-family="'SFMono-Regular', 'Consolas', monospace" font-size="11" fill="#6E7681">foco principal</text>

    <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" fill="#E6EDF3">
      <circle cx="28" cy="88" r="3" fill="#E3B341"/>
      <text x="44" y="93">Java</text>
      <rect x="200" y="80" width="120" height="6" rx="3" fill="#21262D"/>
      <rect x="200" y="80" width="96" height="6" rx="3" fill="#E3B341" opacity="0.7"/>

      <circle cx="28" cy="124" r="3" fill="#E3B341"/>
      <text x="44" y="129">Spring Boot</text>
      <rect x="200" y="116" width="120" height="6" rx="3" fill="#21262D"/>
      <rect x="200" y="116" width="84" height="6" rx="3" fill="#E3B341" opacity="0.7"/>

      <circle cx="28" cy="160" r="3" fill="#8B949E"/>
      <text x="44" y="165" fill="#C9D1D9">REST APIs</text>

      <circle cx="28" cy="196" r="3" fill="#8B949E"/>
      <text x="44" y="201" fill="#C9D1D9">JWT &amp; Autenticação</text>

      <circle cx="28" cy="232" r="3" fill="#8B949E"/>
      <text x="44" y="237" fill="#C9D1D9">Node.js &amp; Express</text>
    </g>
  </g>

  <!-- Frontend -->
  <g transform="translate(425, 36)">
    <rect width="350" height="268" rx="8" fill="#161B22" stroke="#21262D" stroke-width="1"/>
    <rect width="350" height="3" rx="1.5" fill="#58A6FF" opacity="0.6"/>
    <text x="20" y="36" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="3" fill="#ADBAC7">FRONTEND</text>
    <text x="20" y="58" font-family="'SFMono-Regular', 'Consolas', monospace" font-size="11" fill="#6E7681">fundamentos sólidos</text>

    <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" fill="#C9D1D9">
      <circle cx="28" cy="88" r="3" fill="#58A6FF" opacity="0.7"/>
      <text x="44" y="93">React</text>

      <circle cx="28" cy="124" r="3" fill="#58A6FF" opacity="0.7"/>
      <text x="44" y="129">Tailwind CSS</text>

      <circle cx="28" cy="160" r="3" fill="#8B949E"/>
      <text x="44" y="165">JavaScript</text>

      <circle cx="28" cy="196" r="3" fill="#8B949E"/>
      <text x="44" y="201">HTML5 &amp; CSS3</text>
    </g>
  </g>

  <!-- Dados & Ferramentas -->
  <g transform="translate(810, 36)">
    <rect width="350" height="268" rx="8" fill="#161B22" stroke="#21262D" stroke-width="1"/>
    <rect width="350" height="3" rx="1.5" fill="#3FB950" opacity="0.5"/>
    <text x="20" y="36" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="2" fill="#ADBAC7">DADOS &amp; FERRAMENTAS</text>
    <text x="20" y="58" font-family="'SFMono-Regular', 'Consolas', monospace" font-size="11" fill="#6E7681">infra &amp; versionamento</text>

    <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" fill="#C9D1D9">
      <circle cx="28" cy="88" r="3" fill="#3FB950" opacity="0.6"/>
      <text x="44" y="93">PostgreSQL</text>

      <circle cx="28" cy="124" r="3" fill="#3FB950" opacity="0.6"/>
      <text x="44" y="129">MongoDB</text>

      <circle cx="28" cy="160" r="3" fill="#8B949E"/>
      <text x="44" y="165">Docker</text>

      <circle cx="28" cy="196" r="3" fill="#8B949E"/>
      <text x="44" y="201">Git &amp; GitHub</text>
    </g>
  </g>
</svg>
