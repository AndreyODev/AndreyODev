name: Metrics

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/metrics.yml"
      - "scripts/generate-linguagens.mjs"
      - "scripts/generate-trofeus.mjs"

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.METRICS_TOKEN }}

      - name: Gerar linguagens
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GITHUB_USERNAME: AndreyODev
        run: node scripts/generate-linguagens.mjs

      - name: Gerar conquistas dinamicas
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GITHUB_USERNAME: AndreyODev
        run: node scripts/generate-trofeus.mjs

      - name: Commit e push dos assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add assets/linguagens.svg assets/trofeus.svg
          git diff --staged --quiet || git commit -m "Update assets/linguagens.svg e trofeus.svg [Skip GitHub Action]"
          git push
