name: Metrics

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: [".github/workflows/metrics.yml"]

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Estatisticas gerais
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics.svg
          template: classic
          # Apenas o cabecalho de identidade (sem community/repositories/metadata)
          base: header
          config_timezone: America/Sao_Paulo
          config_padding: 10%

          # Calendario de contribuicoes em 3D (mostra total + streak)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Linguagens mais usadas (so as principais)
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 6
          plugin_languages_details: percentage
          plugin_languages_sections: most-used

          # ---- Identidade visual: fundo preto, titulos brancos, latao so como detalhe ----
          extras_css: >
            svg, .background { background: #000000 !important; }
            .background {
              fill: #000000 !important;
              stroke: #1E1E22 !important;
              stroke-width: 1.5 !important;
            }

            /* Titulos das secoes e nome: branco suave (antes eram amarelos) */
            h2, .title, .header .name, .field {
              color: #F2F2F3 !important;
              fill: #F2F2F3 !important;
            }

            /* Texto do corpo: cinza claro legivel */
            text, tspan, p, span, li, td, th, .value {
              fill: #C9D1D9 !important;
              color: #C9D1D9 !important;
            }

            /* Numeros de destaque: latao discreto */
            .fixed-height, .octicon {
              fill: #E3B341 !important;
              color: #E3B341 !important;
            }

            /* Linha divisoria e bordas internas mais sutis */
            .field, hr { border-color: #1E1E22 !important; }
