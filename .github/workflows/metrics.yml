name: Metrics

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: [".github/workflows/metrics.yml"]

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Estatisticas gerais
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics.svg
          template: classic
          base: header, activity, repositories
          config_timezone: America/Sao_Paulo
          config_padding: 8%
          config_animations: no

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 6
          plugin_languages_details: percentage
          plugin_languages_sections: most-used

          extras_css: |
            svg {
              font-family: "Segoe UI", Helvetica, Arial, sans-serif !important;
              background: #000000 !important;
              color: #B8BCC2 !important;
            }
            svg, .background { background: #000000 !important; }
            .background {
              fill: #000000 !important;
              stroke: none !important;
            }
            .items-wrapper {
              padding: 20px !important;
              box-sizing: border-box !important;
            }
            .items-wrapper > section {
              background: #0A0A0B !important;
              border: 1.5px solid #1A1A1C !important;
              border-top: 3px solid #92732D !important;
              border-radius: 10px !important;
              padding: 18px 20px !important;
              margin: 0 0 16px 0 !important;
              box-sizing: border-box !important;
            }
            h1 {
              color: #F2F2F3 !important;
              fill: #F2F2F3 !important;
              font-weight: 700 !important;
            }
            h2, h3, .title {
              color: #F2F2F3 !important;
              fill: #F2F2F3 !important;
              font-weight: 600 !important;
            }
            h2 {
              font-size: 17px !important;
              width: fit-content !important;
              padding-bottom: 6px !important;
              margin: 0 0 10px 0 !important;
              border-bottom: 2.5px solid #92732D !important;
            }
            h3 {
              font-size: 13px !important;
              color: #ADBAC7 !important;
            }
            text, tspan, p, span, li, td, th, .value, .field {
              fill: #C9D1D9 !important;
              color: #B8BCC2 !important;
            }
            .field svg, .octicon {
              fill: #92732D !important;
              color: #92732D !important;
            }
            .field { border-color: #1A1A1C !important; }
            svg.bar rect[fill="#d1d5da"] { fill: #1A1A1C !important; }
