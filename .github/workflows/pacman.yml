name: Pac-Man contribution graph

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/pacman.yml"
      - "scripts/wrap-pacman.mjs"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gerar SVG do Pac-Man (tema escuro, 1 ano)
        uses: DuyetBKU/viz-pacman-github-profile@main
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.METRICS_TOKEN }}
          theme: github-dark
          music: "false"

      - name: Aplicar moldura do perfil
        run: node scripts/wrap-pacman.mjs

      - name: Publicar SVG na branch output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
