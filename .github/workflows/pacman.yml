name: Pac-Man contribution graph

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/pacman.yml"
      - "scripts/compose-atividade.mjs"
      - "scripts/generate-pacman.mjs"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar gerador do Pac-Man
        run: npm install pacman-contribution-graph

      - name: Gerar SVG do Pac-Man (contribuicoes de 2026)
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GITHUB_USERNAME: AndreyODev
          CONTRIBUTION_YEAR: "2026"
        run: node scripts/generate-pacman.mjs

      - name: Compor SVG de atividade no padrao do perfil
        env:
          CONTRIBUTION_YEAR: "2026"
        run: node scripts/compose-atividade.mjs

      - name: Commit e push do asset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/atividade-pacman.svg
          if git diff --staged --quiet; then
            echo "Sem mudancas no asset."
            exit 0
          fi
          git commit -m "Update assets/atividade-pacman.svg [Skip GitHub Action]"
          git push origin HEAD:main
