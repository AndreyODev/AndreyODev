name: Pac-Man contribution graph

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/pacman.yml"
      - "scripts/compose-atividade.mjs"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.METRICS_TOKEN }}

      - name: Gerar SVG do Pac-Man (tema escuro, 1 ano)
        uses: DuyetBKU/viz-pacman-github-profile@main
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.METRICS_TOKEN }}
          theme: github-dark
          music: "false"

      - name: Compor SVG de atividade no padrao do perfil
        run: node scripts/compose-atividade.mjs

      - name: Commit e push do asset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add assets/atividade-pacman.svg
          git diff --staged --quiet || git commit -m "Update assets/atividade-pacman.svg [Skip GitHub Action]"
          git push
